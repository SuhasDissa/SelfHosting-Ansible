---
# ENCRYPT THIS FILE WITH: ansible-vault encrypt vars/secrets.yml
# EDIT WITH: ansible-vault edit vars/secrets.yml

# Domain (kept secret to avoid exposing it in plaintext in git)
domain: your-domain.example.com

# Joplin database credentials
joplin_db_user: joplin
joplin_db_password: CHANGE_ME_STRONG_PASSWORD
joplin_db_name: joplin

# Nextcloud database
nextcloud_db_password: CHANGE_ME_STRONG_PASSWORD

# HedgeDoc database and session
hedgedoc_db_password: CHANGE_ME_STRONG_PASSWORD
hedgedoc_session_secret: CHANGE_ME_RANDOM_64_CHAR_STRING

# SSL certificate email
certbot_email: your-email@example.com

# WireGuard VPN Server Configuration
# Generate keys with: wg genkey | tee privatekey | wg pubkey > publickey

# Server's private key (run: wg genkey)
wireguard_server_private_key: YOUR_SERVER_PRIVATE_KEY_HERE

# Authorized peers (clients) - add your devices here
wireguard_peers:
  - name: "My Laptop"
    public_key: YOUR_CLIENT_PUBLIC_KEY_HERE
    allowed_ips: 10.200.0.2/32
  - name: "My Phone"
    public_key: YOUR_PHONE_PUBLIC_KEY_HERE
    allowed_ips: 10.200.0.3/32
  - name: "My Tab"
    public_key: YOUR_TAB_PUBLIC_KEY_HERE
    allowed_ips: 10.200.0.4/32
